spring:
  application:
    name: weather
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  profiles:
    active: dev

server:
  port: 7093

logging:
  level:
    org.springframework: DEBUG
    org.hibernate: DEBUG
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

tracing:
  url: http://jaeger:4318/v1/traces
  sampling:
    probability: 1.0
  enabled: false

management:
  tracing:
    sampling:
      probability: 1.0
    enabled: false

  # Enable Prometheus metrics endpoint on /actuator/prometheus
  metrics:
    enable:
      all: true
    export:
      prometheus:
        enabled: true
    web:
      exposure:
        include: health,info,prometheus

  # Expose Prometheus metrics endpoint
  endpoints:
    web:
      exposure:
        include: prometheus

